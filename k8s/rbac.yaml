apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-k8s-app-sa
  namespace: python-k8s-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: python-k8s-app
  name: python-k8s-app-role
rules:
# Allow reading pods for health checks
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Allow reading services for service discovery
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# Allow reading endpoints for service discovery
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]
# Allow reading configmaps for configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Allow reading secrets for sensitive data
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: python-k8s-app-rolebinding
  namespace: python-k8s-app
subjects:
- kind: ServiceAccount
  name: python-k8s-app-sa
  namespace: python-k8s-app
roleRef:
  kind: Role
  name: python-k8s-app-role
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for monitoring access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: python-k8s-app-monitoring
rules:
# Allow reading nodes for monitoring
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# Allow reading pods across namespaces for monitoring
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Allow reading services across namespaces for monitoring
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# Allow reading endpoints across namespaces for monitoring
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding for monitoring access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: python-k8s-app-monitoring
subjects:
- kind: ServiceAccount
  name: python-k8s-app-sa
  namespace: python-k8s-app
roleRef:
  kind: ClusterRole
  name: python-k8s-app-monitoring
  apiGroup: rbac.authorization.k8s.io
